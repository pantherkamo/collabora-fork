name: Build and Push Collabora Online

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

env:
  IMAGE_NAME: kamo/collabora-online

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/from-source-gh-action
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:latest
          file: ./docker/from-source-gh-action/Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COLLABORA_ONLINE_REPO=https://github.com/pantherkamo/collabora-fork.git
            COLLABORA_ONLINE_BRANCH=main
